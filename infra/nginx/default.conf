server {
    listen 80;
    server_name worshiphub.ipflamengo.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name worshiphub.ipflamengo.com.br;

    ssl_certificate /etc/letsencrypt/live/worshiphub.ipflamengo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/worshiphub.ipflamengo.com.br/privkey.pem;

    server_tokens off;  # Esconde versão do nginx

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # index.html — cache permitido, mas sempre revalidado com o servidor
    # (ETag/Last-Modified). Se não mudou → 304; se mudou → 200 com novo HTML.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri /index.html;
    }

    # Frontend Vue SPA — o header no-cache garante que o index.html seja
    # sempre revalidado, independente de qual rota SPA o usuário acessa.
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Service Worker — nunca deve ficar em cache; o nome real gerado pelo
    # VitePWA (injectManifest) é firebase-messaging-sw.js.
    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Service-Worker-Allowed "/";
    }

    # Manifest PWA
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
    }

    # API
    location /api/ {
        proxy_pass http://worshiphub-api:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}